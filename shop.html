<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imagi-sketch Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    /* Carousel Styles */
    .carousel {
      position: relative;
      max-width: 800px;
      margin: 20px auto;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }
    .carousel-inner {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }
    .carousel-item {
      min-width: 100%;
      position: relative;
    }
    .carousel-item img {
      width: 100%;
      height: 400px; /* Adjust height as needed */
      object-fit: cover;
      display: block;
    }
    .carousel-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }
    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      font-size: 18px;
      z-index: 10;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .carousel-btn.prev {
      left: 10px;
    }
    .carousel-btn.next {
      right: 10px;
    }
    .carousel-indicators {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .carousel-indicators span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      cursor: pointer;
    }
    .carousel-indicators span.active {
      background: white;
    }
    /* Product Box Styles */
    .product-box {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      max-width: 350px;
      margin: 40px auto;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }
    .product-box img {
      width: 100%;
      border-radius: 10px;
    }
    h1 {
      margin: 10px 0;
    }
    p {
      color: #555;
    }
    .buy-btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: #ff9900;
      color: #000;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <!-- NAVIGATION BAR -->
<nav style="
  background: rgba(0,0,0,0.85);
  padding: 14px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1000;
">
  <a href="index.html" style="
    color: white;
    text-decoration: none;
    margin-right: 20px;
    font-weight: bold;
  ">Free Tutorials</a>
  <span style="
    color: white;
    margin: 0 12px;
  ">
    |
  </span>
  <a href="shop.html" style="
    color: white;
    text-decoration: none;
    font-weight: bold;
  ">Sketchbooks</a>
</nav>
  <!-- Carousel for Sketchbook Images -->
  <div class="carousel">
    <div class="carousel-inner" id="carouselInner">
      <!-- Front Cover -->
      <div class="carousel-item">
        <img src="frontcover.jpg" alt="Sketchbook Front Cover">
        <div class="carousel-caption">Front Cover</div>
      </div>
      <!-- Inside Blank Pages -->
      <div class="carousel-item">
        <img src="blankpages.jpg" alt="Sketchbook Blank Pages">
        <div class="carousel-caption">Inside Blank Pages</div>
      </div>
      <!-- Back Cover -->
      <div class="carousel-item">
        <img src="backcover.jpg" alt="Sketchbook Back Cover">
        <div class="carousel-caption">Back Cover</div>
      </div>
    </div>
    <!-- Navigation Buttons -->
    <button class="carousel-btn prev" id="prevBtn">&#10094;</button>
    <button class="carousel-btn next" id="nextBtn">&#10095;</button>
    <!-- Indicators (Dots) -->
    <div class="carousel-indicators" id="carouselIndicators">
      <span class="active" data-index="0"></span>
      <span data-index="1"></span>
      <span data-index="2"></span>
    </div>
  </div>
  <!-- Product Box -->
  <div class="product-box">
    <img src="sketchbook.jpg" alt="Sketchbook">
    <h1>imagi-sketch Sketchbook</h1>
    <p>Premium beginner sketchbook designed to improve your drawing skills.</p>
    <a href="https://flutterwave.com/pay/683drdfwgjxi" class="buy-btn">Get it</a>
  </div>
  <!-- Carousel JavaScript -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const carouselInner = document.getElementById('carouselInner');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const indicators = document.querySelectorAll('.carousel-indicators span');
      const carouselItems = document.querySelectorAll('.carousel-item');
      let currentIndex = 0;
      const totalItems = carouselItems.length;
      // Update carousel position
      function updateCarousel() {
        carouselInner.style.transform = `translateX(-${currentIndex * 100}%)`;
        // Update active indicator
        indicators.forEach((indicator, index) => {
          indicator.classList.toggle('active', index === currentIndex);
        });
      }
      // Next button click
      nextBtn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % totalItems;
        updateCarousel();
      });
      // Previous button click
      prevBtn.addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + totalItems) % totalItems;
        updateCarousel();
      });
      // Indicator click
      indicators.forEach((indicator, index) => {
        indicator.addEventListener('click', () => {
          currentIndex = index;
          updateCarousel();
        });
      });
      // Auto-slide (optional)
      setInterval(() => {
        currentIndex = (currentIndex + 1) % totalItems;
        updateCarousel();
      }, 5000); // Change slide every 5 seconds
    });
  </script>
</body>
</html>
